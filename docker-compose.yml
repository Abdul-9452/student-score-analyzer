version: '3.8'

services:
  db:
    image: postgres:15              # Docker Hub image 1
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: scores
    volumes:
      - db-data:/var/lib/postgresql/data
    networks:
      - app-network

  redis:
    image: redis:alpine             # Docker Hub image 2
    networks:
      - app-network

  backend:
    build: ./backend                # Dockerfile image 1
    depends_on:
      - db
      - redis
    environment:
      - PORT=5000
    networks:
      - app-network

  frontend:
    build: ./frontend               # Dockerfile image 2
    depends_on:
      - backend
    ports:
      - "8080:8080"
    networks:
      - app-network

  nginx:
    image: nginx:alpine             # Docker Hub image 3
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
    networks:
      - app-network

volumes:
  db-data:

networks:
  app-network:
