name: Docker CI Pipeline

on:
  push:
    branches:
      - main

jobs:

  frontend:

    runs-on: ubuntu-latest

    steps:

    - uses: actions/checkout@v4

    - uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build Frontend
      run: |
        docker build -t ${{ secrets.DOCKER_USERNAME }}/student-frontend ./frontend

    - name: Push Frontend
      run: |
        docker push ${{ secrets.DOCKER_USERNAME }}/student-frontend

  backend:

    runs-on: ubuntu-latest

    steps:

    - uses: actions/checkout@v4

    - uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build Backend
      run: |
        docker build -t ${{ secrets.DOCKER_USERNAME }}/student-backend ./backend

    - name: Push Backend
      run: |
        docker push ${{ secrets.DOCKER_USERNAME }}/student-backend
